<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Todo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f2f3f7;
      --card: #ffffff;
      --text: #1a1a1a;
      --muted: #6b7280;
      --muted-soft: #9ca3af;
      --border: #e5e7eb;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --accent-soft: rgba(99,102,241,.15);
      --danger: #ef4444;
      --danger-soft: #fef2f2;
      --shadow: 0 10px 30px -10px rgba(17,24,39,.15), 0 2px 8px rgba(17,24,39,.06);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #101114;
        --card: #1a1b20;
        --text: #f0f0f2;
        --muted: #9ca3af;
        --muted-soft: #6b7280;
        --border: #2c2d33;
        --accent: #818cf8;
        --accent-hover: #a5b4fc;
        --accent-soft: rgba(129,140,248,.2);
        --danger: #f87171;
        --danger-soft: rgba(248,113,113,.1);
        --shadow: 0 10px 30px -10px rgba(0,0,0,.5), 0 2px 8px rgba(0,0,0,.3);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 56px 16px;
    }
    .card {
      background: var(--card);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 36px;
      width: 100%;
      max-width: 440px;
      transition: background .2s;
    }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 24px; letter-spacing: -.02em; }
    h2 { font-size: 1.05rem; font-weight: 600; margin-bottom: 18px; color: var(--muted); }
    label { display: block; font-size: .8rem; font-weight: 600; margin-bottom: 5px; color: var(--muted); }
    input[type=text], input[type=password] {
      width: 100%; padding: 10px 13px; font-size: 1rem;
      font-family: inherit; color: var(--text); background: var(--card);
      border: 1.5px solid var(--border); border-radius: 9px; outline: none;
      transition: border-color .15s, box-shadow .15s;
    }
    input::placeholder { color: var(--muted-soft); }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-soft); }
    .field { margin-bottom: 16px; }
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 18px; font-size: .95rem; font-weight: 600;
      font-family: inherit; border: none; border-radius: 9px; cursor: pointer;
      transition: background .15s, opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.97); }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-icon {
      background: transparent; color: var(--muted); padding: 6px; border-radius: 7px;
      line-height: 0;
    }
    .btn-icon:hover { background: var(--border); color: var(--text); }
    .btn-icon.danger:hover { background: var(--danger-soft); color: var(--danger); }
    .btn-full { width: 100%; margin-top: 6px; }
    .error { color: var(--danger); font-size: .85rem; margin-bottom: 10px; min-height: 1.2em; }
    .link-row { text-align: center; margin-top: 18px; font-size: .875rem; color: var(--muted); }
    .link-row a { color: var(--accent); text-decoration: none; font-weight: 600; }
    .link-row a:hover { text-decoration: underline; }

    nav {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 22px;
    }
    .app-title { font-weight: 700; font-size: 1.3rem; letter-spacing: -.02em; }
    .user-row { display: flex; align-items: center; gap: 8px; }
    .avatar {
      width: 26px; height: 26px; border-radius: 50%; flex-shrink: 0;
      background: var(--accent); color: #fff; font-size: .75rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center; text-transform: uppercase;
    }
    .logout-link { color: var(--muted); font-size: .8rem; text-decoration: none; }
    .logout-link:hover { color: var(--accent); }

    .progress-track { height: 5px; border-radius: 3px; background: var(--border); margin-bottom: 20px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .25s ease; }
    .progress-label { font-size: .78rem; color: var(--muted); margin: -12px 0 16px; }

    .add-row { display: flex; gap: 8px; margin-bottom: 22px; }
    .add-row input { flex: 1; }

    ul { list-style: none; }
    li {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 2px;
      border-bottom: 1px solid var(--border);
    }
    li.new { animation: fade-in .18s ease; }
    li:last-child { border-bottom: none; }
    li.done .todo-text { color: var(--muted-soft); text-decoration: line-through; }
    .todo-text { flex: 1; font-size: .95rem; word-break: break-word; transition: color .15s; }
    .edit-input { flex: 1; padding: 6px 9px; font-size: .95rem; border: 1.5px solid var(--accent); border-radius: 7px; outline: none; background: var(--card); color: var(--text); }

    .checkbox-wrap { flex-shrink: 0; display: flex; }
    .checkbox { width: 19px; height: 19px; cursor: pointer; accent-color: var(--accent); }
    .actions { display: flex; gap: 2px; flex-shrink: 0; }

    .empty { text-align: center; color: var(--muted-soft); padding: 40px 0 12px; font-size: .88rem; }
    .empty svg { margin-bottom: 10px; opacity: .6; }
    .hidden { display: none !important; }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="card">

  <!-- Login screen -->
  <div id="screen-login">
    <h1>Todo</h1>
    <h2>Log in</h2>
    <div class="error" id="login-error"></div>
    <div class="field"><label>Username</label><input id="login-user" type="text" placeholder="your username" autocomplete="username"></div>
    <div class="field"><label>Password</label><input id="login-pass" type="password" placeholder="••••••••" autocomplete="current-password"></div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">Log in</button>
    <div class="link-row">No account? <a href="#" onclick="show('screen-signup');return false">Sign up</a></div>
  </div>

  <!-- Signup screen -->
  <div id="screen-signup" class="hidden">
    <h1>Todo</h1>
    <h2>Create account</h2>
    <div class="error" id="signup-error"></div>
    <div class="field"><label>Username</label><input id="signup-user" type="text" placeholder="choose a username" autocomplete="username"></div>
    <div class="field"><label>Password</label><input id="signup-pass" type="password" placeholder="min 8 characters" autocomplete="new-password"></div>
    <button class="btn btn-primary btn-full" onclick="doSignup()">Sign up</button>
    <div class="link-row">Have an account? <a href="#" onclick="show('screen-login');return false">Log in</a></div>
  </div>

  <!-- App screen -->
  <div id="screen-app" class="hidden">
    <nav>
      <span class="app-title" id="app-title">My Todos</span>
      <span class="user-row">
        <span class="avatar" id="app-avatar"></span>
        <a href="#" class="logout-link" onclick="doLogout();return false">log out</a>
      </span>
    </nav>
    <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
    <div class="progress-label" id="progress-label"></div>
    <div class="add-row">
      <input id="new-todo" type="text" placeholder="Add a todo…" onkeydown="if(event.key==='Enter')addTodo()">
      <button class="btn btn-primary" onclick="addTodo()">Add</button>
    </div>
    <ul id="todo-list"></ul>
    <div id="empty" class="empty hidden">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 11l3 3L22 4M2 12a10 10 0 1 0 10-10" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <div>Nothing here yet — add your first todo above.</div>
    </div>
  </div>

</div>
<script>
// ── storage helpers ──────────────────────────────────────────────────────────

function usersKey()        { return 'tapp:users'; }
function todosKey(user)    { return 'tapp:todos:' + user; }
function sessionKey()      { return 'tapp:session'; }

function getUsers()        { return JSON.parse(localStorage.getItem(usersKey()) || '{}'); }
function saveUsers(u)      { localStorage.setItem(usersKey(), JSON.stringify(u)); }
function getTodos(user)    { return JSON.parse(localStorage.getItem(todosKey(user)) || '[]'); }
function saveTodos(user,t) { localStorage.setItem(todosKey(user), JSON.stringify(t)); }
function getSession()      { return localStorage.getItem(sessionKey()); }
function saveSession(u)    { localStorage.setItem(sessionKey(), u); }
function clearSession()    { localStorage.removeItem(sessionKey()); }

// simple non-cryptographic hash — good enough for a local demo without a backend
async function hashPass(pass) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// ── routing ──────────────────────────────────────────────────────────────────

function show(id) {
  ['screen-login','screen-signup','screen-app'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}

// ── auth ─────────────────────────────────────────────────────────────────────

async function doSignup() {
  const user = document.getElementById('signup-user').value.trim();
  const pass = document.getElementById('signup-pass').value;
  const err  = document.getElementById('signup-error');
  err.textContent = '';
  if (!user) return err.textContent = 'Username is required.';
  if (pass.length < 8) return err.textContent = 'Password must be at least 8 characters.';
  const users = getUsers();
  if (users[user]) return err.textContent = 'That username is taken.';
  users[user] = await hashPass(pass);
  saveUsers(users);
  saveSession(user);
  loadApp(user);
}

async function doLogin() {
  const user = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;
  const err  = document.getElementById('login-error');
  err.textContent = '';
  if (!user) return err.textContent = 'Username is required.';
  const users = getUsers();
  if (!users[user] || users[user] !== await hashPass(pass))
    return err.textContent = 'Invalid username or password.';
  saveSession(user);
  loadApp(user);
}

function doLogout() {
  clearSession();
  show('screen-login');
}

// ── app ───────────────────────────────────────────────────────────────────────

let currentUser = null;

function loadApp(user) {
  currentUser = user;
  document.getElementById('app-avatar').textContent = user.slice(0, 1);
  show('screen-app');
  renderTodos();
  document.getElementById('new-todo').focus();
}

function renderProgress(todos) {
  const done = todos.filter(t => t.done).length;
  const pct = todos.length ? Math.round(done / todos.length * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent =
    todos.length ? `${done} of ${todos.length} done` : '';
}

function renderTodos() {
  const todos = getTodos(currentUser);
  const list  = document.getElementById('todo-list');
  const empty = document.getElementById('empty');
  list.innerHTML = '';
  renderProgress(todos);
  if (todos.length === 0) { empty.classList.remove('hidden'); return; }
  empty.classList.add('hidden');
  todos.forEach((t, i) => {
    const li = document.createElement('li');
    if (t.done) li.classList.add('done');

    const cbWrap = document.createElement('span');
    cbWrap.className = 'checkbox-wrap';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.className = 'checkbox'; cb.checked = t.done;
    cb.onchange = () => toggleTodo(i);
    cbWrap.appendChild(cb);

    const span = document.createElement('span');
    span.className = 'todo-text'; span.textContent = t.text;

    const actions = document.createElement('div');
    actions.className = 'actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'btn btn-icon'; editBtn.title = 'Edit'; editBtn.setAttribute('aria-label', 'Edit');
    editBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5Z" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    editBtn.onclick = () => startEdit(li, i, t.text, span, editBtn);

    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-icon danger'; delBtn.title = 'Delete'; delBtn.setAttribute('aria-label', 'Delete');
    delBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6" stroke-linecap="round" stroke-linejoin="round"/></svg>';
    delBtn.onclick = () => deleteTodo(i);

    actions.append(editBtn, delBtn);
    li.append(cbWrap, span, actions);
    list.appendChild(li);
  });
}

function startEdit(li, i, text, span, editBtn) {
  const input = document.createElement('input');
  input.className = 'edit-input'; input.value = text;
  span.replaceWith(input);
  editBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6 9 17l-5-5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  editBtn.onclick = () => commitEdit(li, i, input, editBtn);
  input.onkeydown = e => { if (e.key === 'Enter') commitEdit(li, i, input, editBtn); if (e.key === 'Escape') renderTodos(); };
  input.focus(); input.select();
}

function commitEdit(li, i, input, btn) {
  const text = input.value.trim();
  if (!text) return;
  const todos = getTodos(currentUser);
  todos[i].text = text;
  saveTodos(currentUser, todos);
  renderTodos();
}

function addTodo() {
  const input = document.getElementById('new-todo');
  const text  = input.value.trim();
  if (!text) return;
  const todos = getTodos(currentUser);
  todos.push({ text, done: false });
  saveTodos(currentUser, todos);
  input.value = '';
  renderTodos();
  document.querySelector('#todo-list li:last-child')?.classList.add('new');
  input.focus();
}

function toggleTodo(i) {
  const todos = getTodos(currentUser);
  todos[i].done = !todos[i].done;
  saveTodos(currentUser, todos);
  renderTodos();
}

function deleteTodo(i) {
  const todos = getTodos(currentUser);
  todos.splice(i, 1);
  saveTodos(currentUser, todos);
  renderTodos();
}

// ── boot ─────────────────────────────────────────────────────────────────────

const session = getSession();
if (session && getUsers()[session]) {
  loadApp(session);
} else {
  show('screen-login');
}
</script>
</body>
</html>
